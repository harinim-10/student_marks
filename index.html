<!DOCTYPE html>
<html>
<head>
    <title>Advanced Student Marks System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
        }

        .info-box {
            background: #ffffff;
            width: 60%;
            margin: 15px auto;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .form-container {
            margin: 20px auto;
            padding: 15px;
            width: 60%;
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 120px;
        }

        button {
            padding: 8px 15px;
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #2980b9;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 90%;
            background-color: white;
        }

        th {
            background-color: #3498db;
            color: white;
            padding: 10px;
        }

        td {
            padding: 8px;
            border: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .pass {
            color: green;
            font-weight: bold;
        }

        .fail {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Advanced Student Marks Entry</h2>

<div class="info-box">
    <p><strong>Total Marks:</strong> 300</p>
    <p><strong>Pass Mark (Each Subject):</strong> 35</p>
</div>

<div class="form-container">
    <input type="text" id="roll" placeholder="Roll No">
    <input type="text" id="name" placeholder="Name">
    <input type="number" id="maths" placeholder="Maths">
    <input type="number" id="science" placeholder="Science">
    <input type="number" id="english" placeholder="English">
    <br>
    <button onclick="addStudent()">Add Student</button>
</div>

<table id="marksTable">
    <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Maths</th>
        <th>Science</th>
        <th>English</th>
        <th>Total</th>
        <th>Percentage</th>
        <th>Grade</th>
        <th>Result</th>
    </tr>
</table>

<script>

// Move to next input on Enter
var inputs = document.querySelectorAll("input");

inputs.forEach((input, index) => {
    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            if (index < inputs.length - 1) {
                inputs[index + 1].focus();
            } else {
                addStudent();
            }
        }
    });
});

function addStudent() {

    var roll = document.getElementById("roll").value;
    var name = document.getElementById("name").value;
    var maths = parseInt(document.getElementById("maths").value);
    var science = parseInt(document.getElementById("science").value);
    var english = parseInt(document.getElementById("english").value);

    if (roll === "" || name === "" || 
        isNaN(maths) || isNaN(science) || isNaN(english)) {
        alert("Please fill all fields correctly!");
        return;
    }

    var total = maths + science + english;
    var percentage = (total / 300 * 100).toFixed(2);

    var grade;
    if (percentage >= 90) grade = "A+";
    else if (percentage >= 75) grade = "A";
    else if (percentage >= 60) grade = "B";
    else if (percentage >= 50) grade = "C";
    else grade = "D";

    var result = (maths >= 35 && science >= 35 && english >= 35) 
                 ? "Pass" : "Fail";

    var table = document.getElementById("marksTable");
    var row = table.insertRow();

    row.insertCell(0).innerHTML = roll;
    row.insertCell(1).innerHTML = name;
    row.insertCell(2).innerHTML = maths;
    row.insertCell(3).innerHTML = science;
    row.insertCell(4).innerHTML = english;
    row.insertCell(5).innerHTML = total;
    row.insertCell(6).innerHTML = percentage + "%";
    row.insertCell(7).innerHTML = grade;

    var resultCell = row.insertCell(8);
    resultCell.innerHTML = result;
    resultCell.className = result === "Pass" ? "pass" : "fail";

    // Clear fields
    inputs.forEach(input => input.value = "");
    inputs[0].focus();
}

</script>

</body>
</html>
